name: school_management
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: "^3.0.0"

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.6

  #    Firebase (latest compatible)
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.8

  #  Google Sign-In
  google_sign_in: ^6.2.1

  #  UI & Utilities
  dropdown_search: ^5.0.6
  date_time_picker: ^2.1.0
  flutter_svg: ^2.0.10
  fzregex: ^2.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  
  cloud_firestore: ^4.15.0

  flutter_launcher_icons: ^0.14.4   

flutter:
  uses-material-design: true

  assets:
    - assets/notification.png
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ultra_model_school_logo.jpg"
  min_sdk_android: 21

  web:
    generate: true
    image_path: "assets/ultra_model_school_logo.jpg"
    background_color: "#ffffff"
    theme_color: "#ffffff"

  macos:
    generate: true
    image_path: "assets/ultra_model_school_logo.jpg"